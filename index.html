<!doctype html>
<html>
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="index.css">
        <title>Unit Converter</title>
    </head>
    <body>
        <div class="Hero">
            <div id="box1">
                <p>Metric/Imperial unit conversion</p>
                <input id="input-el" type="number"></input>
                <br>
                <button id="btn">Convert</button>
            </div>
            <div id="box2">
                <div id="outputbox1" class="output">
                    <div class="txt">Length(Meter/Feet)</div>
                    <div id="output1" class="subOutput"></div>
                </div>
                <div id="outputbox2" class="output">
                    <div class="txt">Volume(Liters/Gallons)</div>
                    <div id="output2" class="subOutput"></div>
                </div>
                <div id="outputbox3" class="output">
                    <div class="txt">Mass(Kilograms/Pounds)</div>
                    <div id="output3" class="subOutput"></div>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
